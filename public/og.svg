<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background base -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f0d0a"/>
      <stop offset="100%" stop-color="#080603"/>
    </linearGradient>

    <!-- Amber center glow -->
    <radialGradient id="glow-amber" cx="50%" cy="38%" r="55%">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>

    <!-- Coral bottom-left -->
    <radialGradient id="glow-coral" cx="8%" cy="82%" r="42%">
      <stop offset="0%"   stop-color="#e87860" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#e87860" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal bottom-right -->
    <radialGradient id="glow-teal" cx="92%" cy="72%" r="36%">
      <stop offset="0%"   stop-color="#6ec9c9" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#6ec9c9" stop-opacity="0"/>
    </radialGradient>

    <!-- Amber top-right -->
    <radialGradient id="glow-top-right" cx="88%" cy="12%" r="30%">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-amber)"/>
  <rect width="1200" height="630" fill="url(#glow-coral)"/>
  <rect width="1200" height="630" fill="url(#glow-teal)"/>
  <rect width="1200" height="630" fill="url(#glow-top-right)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#f5a623" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Sun icon — center top -->
  <!-- Outer ring -->
  <circle cx="600" cy="176" r="32" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Inner dot -->
  <circle cx="600" cy="176" r="8"  fill="#f5a623" fill-opacity="0.7"/>
  <!-- Cardinal rays -->
  <line x1="600" y1="130" x2="600" y2="118" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="600" y1="222" x2="600" y2="234" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="554" y1="176" x2="542" y2="176" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="646" y1="176" x2="658" y2="176" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- Diagonal rays -->
  <line x1="567" y1="143" x2="559" y2="135" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="633" y1="209" x2="641" y2="217" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="633" y1="143" x2="641" y2="135" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="567" y1="209" x2="559" y2="217" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>

  <!-- LUMEN wordmark -->
  <text
    x="600" y="318"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108"
    font-weight="200"
    fill="#f2ece4"
    text-anchor="middle"
    letter-spacing="28"
    opacity="0.96"
  >LUMEN</text>

  <!-- Divider dots -->
  <circle cx="556" cy="354" r="2" fill="#f5a623" fill-opacity="0.3"/>
  <circle cx="600" cy="354" r="2" fill="#f5a623" fill-opacity="0.3"/>
  <circle cx="644" cy="354" r="2" fill="#f5a623" fill-opacity="0.3"/>

  <!-- Tagline -->
  <text
    x="600" y="404"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="400"
    font-style="italic"
    fill="#f5a623"
    text-anchor="middle"
    opacity="0.82"
  >Your home, understood.</text>

  <!-- Descriptor -->
  <text
    x="600" y="460"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="300"
    fill="#ede8e2"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0.35"
  >A CALM HOME COMPANION FOR IPHONE</text>

  <!-- Horizontal rule -->
  <line x1="440" y1="500" x2="760" y2="500" stroke="#f5a623" stroke-opacity="0.12" stroke-width="1"/>

  <!-- URL -->
  <text
    x="600" y="536"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#f5a623"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.45"
  >lumen.muharafiq.com</text>

  <!-- Bottom left badge: iOS + HomeKit -->
  <text
    x="56" y="590"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="12"
    fill="#ede8e2"
    letter-spacing="2"
    opacity="0.2"
  >iOS · HomeKit · Matter · On-device AI</text>

  <!-- Bottom right: launching -->
  <text
    x="1144" y="590"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="12"
    fill="#f5a623"
    text-anchor="end"
    letter-spacing="2"
    opacity="0.3"
  >Launching 2026</text>
</svg>
