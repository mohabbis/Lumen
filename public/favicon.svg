<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark purple rounded background -->
  <rect width="32" height="32" rx="7" fill="#0e0819"/>
  <!-- amber sun: filled center circle + 8 short rays -->
  <circle cx="16" cy="16" r="4.6" fill="#e8a020"/>
  <g stroke="#e8a020" stroke-width="1.9" stroke-linecap="round">
    <line x1="16" y1="5.5" x2="16" y2="8.4"/>
    <line x1="16" y1="23.6" x2="16" y2="26.5"/>
    <line x1="5.5" y1="16" x2="8.4" y2="16"/>
    <line x1="23.6" y1="16" x2="26.5" y2="16"/>
    <line x1="8.9"  y1="8.9"  x2="10.9" y2="10.9"/>
    <line x1="21.1" y1="21.1" x2="23.1" y2="23.1"/>
    <line x1="23.1" y1="8.9"  x2="21.1" y2="10.9"/>
    <line x1="8.9"  y1="23.1" x2="10.9" y2="21.1"/>
  </g>
</svg>
